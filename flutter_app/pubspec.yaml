name: gps_tracker_app
description: Real-time GPS Tracker Dashboard
version: 1.0.8+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.4

  # Networking
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^6.1.3

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_cancellable_tile_provider: ^3.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2

  # UI / Animation
  flutter_animate: ^4.5.2
  cached_network_image: ^3.3.1

  # QR scanner
  mobile_scanner: ^7.0.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
